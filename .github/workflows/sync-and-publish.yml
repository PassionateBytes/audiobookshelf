---
name: Sync Fork & Publish Docker Image

on:
  schedule:
    # Check for new upstream releases daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run even if no new upstream tag detected"
        required: false
        default: "false"
        type: boolean

env:
  UPSTREAM_REPO: advplyr/audiobookshelf
  FIX_BRANCH: fix-dns-resolution
  PR_NUMBER: "4885"
  DOCKER_IMAGE: passionatebytessolutions/audiobookshelf

jobs:
  check-upstream:
    runs-on: ubuntu-24.04
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - name: Get latest upstream tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/${{ env.UPSTREAM_REPO }}/releases/latest --jq '.tag_name')
          echo "Latest upstream tag: $LATEST_TAG"

          LAST_SYNCED="${{ vars.LAST_SYNCED_TAG }}"
          echo "Last synced tag: $LAST_SYNCED"

          VERSION="${LATEST_TAG#v}"
          echo "upstream_version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LATEST_TAG" != "$LAST_SYNCED" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No new release detected. Skipping."
          fi

  sync-and-rebase:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Sync fork default branch with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/merge-upstream \
            -f branch=master

      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FIX_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase fix branch onto master
        run: |
          git fetch origin master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rebase origin/master
          git push --force-with-lease origin ${{ env.FIX_BRANCH }}

      - name: Update last synced tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            repos/${{ github.repository }}/actions/variables/LAST_SYNCED_TAG \
            -f name=LAST_SYNCED_TAG \
            -f value="v${{ needs.check-upstream.outputs.upstream_version }}"

  build-and-publish:
    needs: [check-upstream, sync-and-rebase]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FIX_BRANCH }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ needs.check-upstream.outputs.upstream_version }}-pr${{ env.PR_NUMBER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
